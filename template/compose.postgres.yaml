services:
  db:
    container_name: db
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE:?}
      - POSTGRES_PASSWORD_FILE=/var/run/secrets/db-root-password
    secrets:
      - db-root-password
    volumes:
      - type: bind
        source: ${POSTGRESDB_VOLUME_PATH:?}
        target: /var/lib/postgresql
        bind:
          create_host_path: false

secrets:
  db-root-password:
    file: .secrets/db_root_password
