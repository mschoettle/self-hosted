services:
  nextcloud:
    image: nextcloud:32.0.6-apache
    container_name: nextcloud
    depends_on:
      - db
      - valkey
    volumes:
      - type: bind
        source: ${NEXTCLOUD_VOLUME_PATH:?}
        target: /var/www/html
        bind:
          create_host_path: false
    environment:
      - TZ=${TIMEZONE:?}
      - REDIS_HOST=valkey
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES:?}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${NEXTCLOUD_DOMAIN:?}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_DOMAIN:?}`)"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
    # required for setupchecks to work
    dns:
      - 192.168.1.10

  nextcloud-cron:
    image: nextcloud:32.0.6-apache
    container_name: nextcloud-cron
    depends_on:
      - db
      - valkey
    volumes:
      - type: bind
        source: ${NEXTCLOUD_VOLUME_PATH:?}
        target: /var/www/html
        bind:
          create_host_path: false
    entrypoint: /cron.sh
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.0.3-alpine3.23
    container_name: nextcloud-valkey
    volumes:
      - type: bind
        source: ${VALKEY_VOLUME_PATH:?}
        target: /data
        bind:
          create_host_path: false
    restart: unless-stopped
